<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>슬로우고고 - 기타 코드 악보</title>
  <meta name="description" content="슬로우고고에서 기타 코드 악보를 확인하세요.">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }
    .card {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 24px;
      padding: 48px 36px;
      text-align: center;
      max-width: 380px;
      width: 90%;
    }
    .logo-img { width: 80px; height: 80px; border-radius: 20px; margin-bottom: 20px; box-shadow: 0 8px 16px rgba(0,0,0,0.2); }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
    p { color: rgba(255,255,255,0.7); font-size: 15px; margin-bottom: 32px; line-height: 1.6; }
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 16px 24px;
      border-radius: 14px;
      text-decoration: none;
      font-weight: 600;
      font-size: 16px;
      margin-bottom: 12px;
      transition: transform 0.2s, opacity 0.2s;
    }
    .btn:active { transform: scale(0.97); opacity: 0.9; }
    .btn-ios {
      background: linear-gradient(135deg, #007AFF, #0051D0);
      color: white;
    }
    .btn-android {
      background: linear-gradient(135deg, #34A853, #1E7E3A);
      color: white;
    }
    .hint { font-size: 13px; color: rgba(255,255,255,0.45); margin-top: 20px; line-height: 1.5; }
    .en-text { display: block; font-size: 0.85em; opacity: 0.75; margin-top: 4px; font-weight: 400; }
    .btn-text { display: flex; flex-direction: column; align-items: flex-start; text-align: left; }
  </style>
</head>
<body>
  <div class="card">
    <img src="/main_icon.png" alt="SlowGoGo Logo" class="logo-img">
    <h1>슬로우고고</h1>
    <p>

      <br>
      앱을 설치하고 악보를 확인하세요!

      <div class="btn-text">
        App Store에서 다운로드

    </a>
    <a href="https://play.google.com/store/apps/details?id=com.applgongbang.napli" class="btn btn-android">
      <svg viewBox="0 0 512 512" width="20" height="20" fill="currentColor"><path d="M325.3 234.3L104.6 13l280.8 161.2-60.1 60.1zM47 0C34 6.8 25.3 19.2 25.3 35.3v441.3c0 16.1 8.7 28.5 21.7 35.3l256.6-256L47 0zm425.2 225.6l-58.9-34.1-65.7 64.5 65.7 64.5 60.1-34.1c18-14.3 18-46.5-1.2-60.8zM104.6 499l280.8-161.2-60.1-60.1L104.6 499z"/></svg>
      <div class="btn-text">
        Google Play에서 다운로드

      </div>
    </a>
    <p class="hint">
      앱이 설치되어 있다면 자동으로 열립니다
      <span class="en-text">Opens automatically if the app is installed</span>
    </p>
  </div>
  <script>
    // 앱이 설치된 경우 딥링크로 열기 시도
    const url = new URL(window.location.href);
    const deepLink = 'com.applgongbang.napli://song' + url.pathname.replace('/song', '') + url.search;

    // 앱이 열리면 이 타이머는 의미없어짐
    setTimeout(() => {}, 2500);
  </script>
</body>
</html>
