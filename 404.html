<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>슬로우고고 - 기타 코드 악보</title>
  <meta name="description" content="슬로우고고에서 기타 코드 악보를 확인하세요.">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }
    .card {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 24px;
      padding: 48px 36px;
      text-align: center;
      max-width: 380px;
      width: 90%;
    }
    .logo { font-size: 48px; margin-bottom: 16px; }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
    p { color: rgba(255,255,255,0.7); font-size: 15px; margin-bottom: 32px; line-height: 1.6; }
    .btn {
      display: block;
      padding: 16px 24px;
      border-radius: 14px;
      text-decoration: none;
      font-weight: 600;
      font-size: 16px;
      margin-bottom: 12px;
      transition: transform 0.2s, opacity 0.2s;
    }
    .btn:active { transform: scale(0.97); opacity: 0.9; }
    .btn-ios {
      background: linear-gradient(135deg, #007AFF, #0051D0);
      color: white;
    }
    .btn-android {
      background: linear-gradient(135deg, #34A853, #1E7E3A);
      color: white;
    }
    .hint { font-size: 13px; color: rgba(255,255,255,0.45); margin-top: 20px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🎸</div>
    <h1>슬로우고고</h1>
    <p>기타 초보자를 위한 코드 악보 플랫폼.<br>앱을 설치하고 악보를 확인하세요!</p>
    <a href="https://apps.apple.com/app/id6743451705" class="btn btn-ios">
      📱 App Store에서 다운로드
    </a>
    <a href="https://play.google.com/store/apps/details?id=com.applgongbang.napli" class="btn btn-android">
      🤖 Google Play에서 다운로드
    </a>
    <p class="hint">앱이 설치되어 있다면 자동으로 열립니다</p>
  </div>
  <script>
    // 앱이 설치된 경우 딥링크로 열기 시도
    const url = new URL(window.location.href);
    const deepLink = 'com.applgongbang.napli://song' + url.pathname.replace('/song', '') + url.search;
    // 잠시 후 스토어로 이동 (앱이 없는 경우 fallback)
    // 앱이 열리면 이 타이머는 의미없어짐
    setTimeout(() => {}, 2500);
  </script>
</body>
</html>
